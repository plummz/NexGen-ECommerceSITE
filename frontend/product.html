<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product — NexGen Shop</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .product-detail { display:grid; grid-template-columns:1fr 1fr; gap:40px; }
    @media(max-width:768px){ .product-detail { grid-template-columns:1fr; } }
    .gallery { position:sticky; top:80px; }
    .gallery-main { background:var(--dark); border-radius:10px; height:360px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:12px; border:1px solid var(--dark4); }
    .gallery-main img { max-width:100%; max-height:100%; object-fit:contain; }
    .gallery-thumbs { display:flex; gap:8px; flex-wrap:wrap; }
    .thumb { width:60px; height:60px; background:var(--dark); border:2px solid var(--dark4); border-radius:6px; overflow:hidden; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .thumb:hover,.thumb.active { border-color:var(--red); }
    .thumb img { width:100%; height:100%; object-fit:contain; }
    .product-title { font-size:22px; font-weight:700; margin-bottom:10px; line-height:1.4; }
    .product-meta { display:flex; align-items:center; gap:16px; margin-bottom:16px; font-size:13px; color:var(--dim); }
    .product-price { display:flex; align-items:baseline; gap:12px; margin-bottom:20px; }
    .big-price { font-size:32px; font-weight:bold; color:var(--red); }
    .big-orig  { font-size:16px; color:var(--dim); text-decoration:line-through; }
    .big-disc  { background:var(--gold); color:#000; font-size:13px; font-weight:bold; padding:3px 10px; border-radius:4px; }
    .variations { margin-bottom:20px; }
    .variations h4 { font-size:13px; color:var(--dim); margin-bottom:10px; }
    .var-btns { display:flex; flex-wrap:wrap; gap:8px; }
    .var-btn { background:var(--dark4); border:1.5px solid var(--dark4); color:var(--dim); padding:7px 14px; border-radius:6px; cursor:pointer; font-size:13px; transition:all .2s; }
    .var-btn:hover { border-color:var(--red); color:var(--text); }
    .var-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(255,204,0,.08); }
    .var-btn.out { opacity:.4; cursor:not-allowed; text-decoration:line-through; }
    .qty-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .qty-ctrl { display:flex; align-items:center; border:1px solid var(--dark4); border-radius:var(--radius); overflow:hidden; }
    .qty-ctrl button { background:var(--dark4); border:none; color:var(--text); width:36px; height:36px; font-size:18px; cursor:pointer; }
    .qty-ctrl button:hover { background:var(--dark); }
    .qty-ctrl input { width:50px; background:transparent; border:none; color:var(--text); text-align:center; font-size:15px; outline:none; }
    .action-btns { display:flex; gap:12px; margin-bottom:24px; }
    .action-btns .btn-primary { flex:1; font-size:15px; padding:14px; }
    .product-tabs { margin-top:40px; }
    .tab-buttons { display:flex; border-bottom:2px solid var(--dark4); margin-bottom:20px; }
    .tab-btn { padding:10px 20px; background:none; border:none; color:var(--dim); font-size:14px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab-btn.active { color:var(--gold); border-bottom-color:var(--red); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .review-item { padding:16px 0; border-bottom:1px solid var(--dark4); }
    .review-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .reviewer-avatar { width:36px; height:36px; background:var(--red); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; flex-shrink:0; }
    .review-stars { color:var(--gold); font-size:13px; }
    .review-date { font-size:12px; color:var(--dim); margin-left:auto; }
    .review-body { font-size:14px; color:var(--dim); line-height:1.6; }
    .rating-bar { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:13px; }
    .rating-bar-fill { flex:1; height:6px; background:var(--dark4); border-radius:3px; overflow:hidden; }
    .rating-bar-fill div { height:100%; background:var(--gold); border-radius:3px; }
    .write-review { background:var(--dark4); border-radius:10px; padding:20px; margin-top:20px; }
    .write-review h4 { font-size:13px; color:var(--gold); margin-bottom:14px; }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div class="page-wrap">
  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="productContent">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>

  <!-- RELATED -->
  <hr class="divider" style="margin:40px 0 20px">
  <div class="sec-header">
    <div class="sec-title">🛍️ YOU MIGHT ALSO LIKE</div>
  </div>
  <div class="products-grid" id="relatedGrid"></div>
</div>
<div id="footer-root"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
const pid = new URLSearchParams(location.search).get('id');
let product     = null;
let selectedVar = null;
let wlIds       = [];

async function init() {
  await Components.init();
  if (!pid) { location.href = 'products.html'; return; }
  try { if (Auth.isLoggedIn()) wlIds = await Api.wishlist.ids(); } catch {}

  try {
    product = await Api.products.get(pid);
    renderProduct(product);
    loadRelated();
    loadReviews();
  } catch {
    document.getElementById('productContent').innerHTML =
      '<div class="empty-state"><div class="empty-icon">😢</div><h3>Product not found</h3><a href="products.html" class="btn-primary">Browse Products</a></div>';
  }
}

function renderProduct(p) {
  const disc = p.original_price ? Math.round((1 - p.price / p.original_price)*100) : 0;
  const wishlisted = wlIds.includes(p.id);
  const allImages  = [p.image, ...(p.images||[]).map(i=>i.url)].filter(Boolean);
  let mainImg      = allImages[0] || '';

  document.title = `${p.name} — NexGen Shop`;
  document.getElementById('breadcrumb').innerHTML =
    `<a href="index.html">Home</a> › <a href="products.html">Products</a> › <a href="products.html?cat=${p.category}">${p.category_name||p.category}</a> › <span>${Components._esc(p.name)}</span>`;

  selectedVar = p.variations?.[0] || null;

  document.getElementById('productContent').innerHTML = `
<div class="product-detail">
  <!-- GALLERY -->
  <div class="gallery">
    <div class="gallery-main">
      <img id="mainImg" src="${mainImg ? 'assets/'+mainImg : ''}" alt="${Components._esc(p.name)}"
           onerror="this.style.display='none'" ${!mainImg?'style="display:none"':''}>
      ${!mainImg ? `<span style="font-size:80px">${Components._catEmoji(p.category)}</span>` : ''}
    </div>
    ${allImages.length > 1 ? `
    <div class="gallery-thumbs">
      ${allImages.map((img,i) => `
        <div class="thumb ${i===0?'active':''}" onclick="switchImg('assets/${img}',this)">
          <img src="assets/${img}" alt="" onerror="this.parentElement.style.display='none'">
        </div>`).join('')}
    </div>` : ''}
  </div>

  <!-- INFO -->
  <div>
    ${p.badge ? `<div class="card-badge" style="position:static;display:inline-block;margin-bottom:10px">${Components._esc(p.badge)}</div>` : ''}
    <h1 class="product-title">${Components._esc(p.name)}</h1>

    <div class="product-meta">
      <span style="color:var(--gold)">${Components._stars(p.rating)} ${p.rating}</span>
      <span>${Number(p.sold_count).toLocaleString()} sold</span>
      <span id="stockBadge" class="${p.stock > 0 ? 'text-green' : 'text-red'}">
        ${p.stock > 10 ? 'In Stock' : p.stock > 0 ? `Only ${p.stock} left!` : 'Out of Stock'}
      </span>
    </div>

    <div class="product-price">
      <span class="big-price">₱${Number(p.price).toLocaleString()}</span>
      ${p.original_price ? `<span class="big-orig">₱${Number(p.original_price).toLocaleString()}</span>` : ''}
      ${disc ? `<span class="big-disc">-${disc}%</span>` : ''}
    </div>

    ${p.variations?.length ? `
    <div class="variations">
      <h4>Variation: <strong id="selectedVarName" style="color:var(--gold)">${Components._esc(p.variations[0].name)}</strong></h4>
      <div class="var-btns" id="varBtns">
        ${p.variations.map((v,i) => `
          <button class="var-btn ${i===0?'active':''} ${v.stock===0?'out':''}"
                  onclick="selectVar(${v.id},'${Components._esc(v.name)}',this)"
                  ${v.stock===0?'disabled':''}>
            ${Components._esc(v.name)}
          </button>`).join('')}
      </div>
    </div>` : ''}

    <div class="qty-row">
      <label style="font-size:13px;color:var(--dim)">Quantity:</label>
      <div class="qty-ctrl">
        <button onclick="changeQty(-1)">−</button>
        <input type="number" id="qtyInput" value="1" min="1" max="${p.stock}">
        <button onclick="changeQty(1)">+</button>
      </div>
    </div>

    <div class="action-btns">
      <button class="btn-primary" onclick="addToCart()" id="addCartBtn" ${p.stock===0?'disabled':''}>
        ${p.stock > 0 ? '🛒 Add to Cart' : 'Out of Stock'}
      </button>
      <button class="wish-btn ${wishlisted?'active':''}" style="position:static;width:44px;height:44px;flex-shrink:0"
              onclick="Components.toggleWishlist(${p.id},this)">
        ${wishlisted?'♥':'♡'}
      </button>
    </div>

    <!-- Trust badges -->
    <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--dim)">
      <span>🚚 Free shipping ₱500+</span>
      <span>🔄 15-day returns</span>
      <span>✅ 100% authentic</span>
      <span>🛡️ Secure checkout</span>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="product-tabs">
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('desc',this)">Description</button>
    <button class="tab-btn" onclick="switchTab('reviews',this)">Reviews <span id="reviewCount"></span></button>
    <button class="tab-btn" onclick="switchTab('shipping',this)">Shipping</button>
  </div>

  <div class="tab-pane active" id="tab-desc">
    <p style="color:var(--dim);line-height:1.8;font-size:15px">${Components._esc(p.description||'')}</p>
  </div>

  <div class="tab-pane" id="tab-reviews">
    <div id="ratingOverview" style="margin-bottom:24px"></div>
    <div id="reviewsList"></div>
    <div id="writeReviewSection"></div>
  </div>

  <div class="tab-pane" id="tab-shipping">
    <div style="color:var(--dim);font-size:14px;line-height:2">
      <p>🚚 <strong style="color:var(--text)">Standard Delivery</strong> — 3–7 business days (₱99 or FREE on orders ₱500+)</p>
      <p>⚡ <strong style="color:var(--text)">Express Delivery</strong> — 1–2 business days (₱199)</p>
      <p>📦 <strong style="color:var(--text)">Cash on Delivery (COD)</strong> — Available nationwide</p>
      <p>💳 <strong style="color:var(--text)">GCash / Maya</strong> — Online payment</p>
      <p>🔄 <strong style="color:var(--text)">Returns</strong> — 15 days from delivery, item must be unused</p>
    </div>
  </div>
</div>`;

  // Stars rating area
  document.addEventListener('click', () => {
    document.getElementById('searchDropdown')?.classList.remove('open');
  });
}

function switchImg(src, el) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function selectVar(id, name, btn) {
  selectedVar = product.variations.find(v => v.id === id);
  document.getElementById('selectedVarName').textContent = name;
  document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function changeQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(1, Math.min(product.stock, parseInt(el.value||1) + d));
}

async function addToCart() {
  if (!Auth.isLoggedIn()) {
    location.href = `profile.html?redirect=${encodeURIComponent(location.href)}`;
    return;
  }
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  try {
    await Api.cart.add({
      product_id:   product.id,
      variation_id: selectedVar?.id || null,
      variation:    selectedVar?.name || 'default',
      quantity:     qty,
    });
    showToast(`${product.name} added to cart!`);
    await Components.updateCartBadge();
  } catch (err) {
    showToast(err.message || 'Could not add to cart.', 'error');
  }
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  btn.classList.add('active');
}

async function loadReviews() {
  try {
    const { reviews, total } = await Api.products.reviews(pid, { limit:10 });
    document.getElementById('reviewCount').textContent = `(${total})`;

    // Rating overview
    const breakdown = product.rating_breakdown || [];
    const totalRatings = breakdown.reduce((s,r) => s + parseInt(r.count), 0);
    document.getElementById('ratingOverview').innerHTML = `
<div style="display:flex;align-items:center;gap:30px;flex-wrap:wrap">
  <div style="text-align:center">
    <div style="font-size:48px;font-weight:bold;color:var(--gold)">${product.rating}</div>
    <div style="font-size:18px;color:var(--gold)">${Components._stars(product.rating)}</div>
    <div style="font-size:12px;color:var(--dim)">${totalRatings} reviews</div>
  </div>
  <div style="flex:1;min-width:200px">
    ${[5,4,3,2,1].map(star => {
      const r = breakdown.find(b => parseInt(b.rating) === star);
      const count = r ? parseInt(r.count) : 0;
      const pct = totalRatings ? Math.round(count/totalRatings*100) : 0;
      return `<div class="rating-bar">
        <span style="color:var(--gold);width:20px">${star}★</span>
        <div class="rating-bar-fill"><div style="width:${pct}%"></div></div>
        <span style="color:var(--dim);width:36px;text-align:right">${count}</span>
      </div>`;
    }).join('')}
  </div>
</div>`;

    // Reviews list
    document.getElementById('reviewsList').innerHTML = reviews.length
      ? reviews.map(r => `
<div class="review-item">
  <div class="review-header">
    <div class="reviewer-avatar">${Components._esc(r.user_avatar || r.user_name[0])}</div>
    <div>
      <div style="font-size:13px;font-weight:600">${Components._esc(r.user_name)}</div>
      <div class="review-stars">${Components._stars(r.rating)} (${r.rating}/5)</div>
    </div>
    <div class="review-date">${new Date(r.created_at).toLocaleDateString()}</div>
  </div>
  ${r.body ? `<p class="review-body">${Components._esc(r.body)}</p>` : ''}
</div>`).join('')
      : '<p style="color:var(--dim);padding:20px 0">No reviews yet. Be the first to review!</p>';

    // Write review form
    if (Auth.isLoggedIn()) {
      document.getElementById('writeReviewSection').innerHTML = `
<div class="write-review">
  <h4>Write a Review</h4>
  <div class="form-group">
    <div class="star-input" id="starInput">
      ${[5,4,3,2,1].map(n => `
        <input type="radio" name="stars" id="s${n}" value="${n}">
        <label for="s${n}">★</label>`).join('')}
    </div>
  </div>
  <div class="form-group">
    <textarea id="reviewBody" class="form-control" rows="3" placeholder="Share your thoughts..."></textarea>
  </div>
  <button class="btn-primary" onclick="submitReview()">Submit Review</button>
</div>`;
    }
  } catch {}
}

async function submitReview() {
  const rating = parseInt(document.querySelector('input[name="stars"]:checked')?.value);
  const body   = document.getElementById('reviewBody')?.value.trim();
  if (!rating) { showToast('Please select a star rating.', 'error'); return; }
  try {
    await Api.reviews.create({ product_id: parseInt(pid), rating, body });
    showToast('Review submitted!');
    loadReviews();
  } catch (err) {
    showToast(err.message || 'Could not submit review.', 'error');
  }
}

async function loadRelated() {
  try {
    const products = await Api.products.related(pid);
    document.getElementById('relatedGrid').innerHTML = products.map(p => Components.buildProductCard(p, wlIds)).join('');
  } catch {}
}

init();
</script>
</body>
</html>
