<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Order Confirmed — NexGen Shop</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .confirm-card { max-width:700px; margin:0 auto; }
    .confirm-header { text-align:center; padding:40px 20px 30px; }
    .confirm-icon { font-size:72px; margin-bottom:16px; animation:pop .4s ease; }
    @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .confirm-header h1 { font-family:'Press Start 2P',sans-serif; font-size:16px; color:var(--gold); margin-bottom:10px; }
    .order-id { font-size:13px; color:var(--dim); }
    .order-id span { color:var(--text); font-weight:bold; }
    .timeline { position:relative; padding:20px 0; }
    .timeline::before { content:''; position:absolute; left:16px; top:0; bottom:0; width:2px; background:var(--dark4); }
    .tl-item { display:flex; gap:20px; margin-bottom:24px; position:relative; }
    .tl-dot { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; border:2px solid var(--dark4); background:var(--dark3); z-index:1; }
    .tl-dot.done  { border-color:var(--green); background:rgba(34,170,68,.15); }
    .tl-dot.active{ border-color:var(--gold);  background:rgba(255,204,0,.1); }
    .tl-info h4 { font-size:13px; margin-bottom:2px; }
    .tl-info p  { font-size:12px; color:var(--dim); }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div class="page-wrap">
  <div class="confirm-card">

    <div class="confirm-header panel">
      <div class="confirm-icon">🎉</div>
      <h1>ORDER CONFIRMED!</h1>
      <p class="order-id">Order ID: <span id="orderId">—</span></p>
      <p style="color:var(--dim);font-size:13px;margin-top:8px">
        Thank you for your order! We'll send updates as your order progresses.
      </p>
    </div>

    <div class="panel mt-16" id="orderDetails">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>

    <!-- Status Timeline -->
    <div class="panel mt-16">
      <div class="panel-title">📦 ORDER STATUS</div>
      <div class="timeline" id="statusTimeline">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
      <a href="profile.html#orders" class="btn-outline" style="flex:1;text-align:center;padding:12px">View All Orders</a>
      <a href="products.html"       class="btn-primary" style="flex:1;text-align:center;padding:12px">Continue Shopping</a>
    </div>
  </div>
</div>
<div id="footer-root"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
const oid = new URLSearchParams(location.search).get('id');

async function init() {
  await Components.init();
  if (!oid || !Auth.isLoggedIn()) { location.href = 'index.html'; return; }

  document.getElementById('orderId').textContent = `#${oid}`;

  try {
    const order = await Api.orders.get(oid);
    renderDetails(order);
    renderTimeline(order);
  } catch {
    const cached = JSON.parse(sessionStorage.getItem('nexgen_last_order') || 'null');
    if (cached) {
      renderDetails(cached);
      renderTimeline(cached);
    }
  }
}

function renderDetails(order) {
  const items = order.items || [];
  document.getElementById('orderDetails').innerHTML = `
<div class="panel-title">📋 ORDER DETAILS</div>
<div style="margin-bottom:16px">
  ${items.map(i => `
  <div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--dark4)">
    ${i.image ? `<img src="assets/${i.image}" style="width:50px;height:50px;object-fit:contain;background:var(--dark);border-radius:6px" onerror="this.style.display='none'">` : ''}
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600">${Components._esc(i.name)}</div>
      ${i.variation && i.variation !== 'default' ? `<div style="font-size:11px;color:var(--dim)">${Components._esc(i.variation)}</div>` : ''}
      <div style="font-size:12px;color:var(--dim)">x${i.quantity}</div>
    </div>
    <div style="font-size:13px;font-weight:bold;color:var(--red)">₱${Number(i.subtotal||i.price*i.quantity).toLocaleString()}</div>
  </div>`).join('')}
</div>
<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:bold;color:var(--text)">
  <span>Total</span><span>₱${Number(order.total).toLocaleString()}</span>
</div>
<div style="margin-top:12px;font-size:13px;color:var(--dim)">
  Payment: <strong style="color:var(--text)">${{cod:'Cash on Delivery',gcash:'GCash',maya:'Maya',card:'Credit/Debit Card'}[order.payment_method]||order.payment_method}</strong>
  &nbsp;•&nbsp; Status: <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
</div>`;
}

const STATUS_STEPS = [
  { status:'pending',   icon:'📝', label:'Order Placed',     desc:'Your order has been received.' },
  { status:'confirmed', icon:'✅', label:'Order Confirmed',  desc:'We\'ve confirmed your order.' },
  { status:'packed',    icon:'📦', label:'Packed',           desc:'Your order is being prepared.' },
  { status:'shipped',   icon:'🚚', label:'Shipped',          desc:'Your order is on the way!' },
  { status:'delivered', icon:'🎉', label:'Delivered',        desc:'Order delivered successfully.' },
];

function renderTimeline(order) {
  const history = order.history || [{ status: order.status }];
  const completedStatuses = new Set(history.map(h => h.status));
  const currentIdx = STATUS_STEPS.findIndex(s => s.status === order.status);

  document.getElementById('statusTimeline').innerHTML = STATUS_STEPS.map((s, i) => {
    const done   = i <= currentIdx;
    const active = i === currentIdx;
    return `
<div class="tl-item">
  <div class="tl-dot ${done?'done':''} ${active?'active':''}">${done?'✓':s.icon}</div>
  <div class="tl-info">
    <h4 style="${active?'color:var(--gold)':done?'color:var(--green)':''}">${s.label}</h4>
    <p>${s.desc}</p>
    ${active ? `<p style="color:var(--gold);margin-top:2px">Current status</p>` : ''}
  </div>
</div>`;
  }).join('');
}

init();
</script>
</body>
</html>
