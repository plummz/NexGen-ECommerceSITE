<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Coupons — NexGen Shop</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .coupon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .coupon-card { background:var(--dark2); border:2px dashed var(--dark4); border-radius:10px; padding:20px; position:relative; overflow:hidden; transition:border-color .2s; }
    .coupon-card:hover { border-color:var(--gold); }
    .coupon-card::before { content:''; position:absolute; left:-1px; top:50%; transform:translateY(-50%); width:20px; height:20px; background:var(--dark3); border-radius:50%; }
    .coupon-card::after  { content:''; position:absolute; right:-1px; top:50%; transform:translateY(-50%); width:20px; height:20px; background:var(--dark3); border-radius:50%; }
    .coupon-code { font-family:'Press Start 2P',sans-serif; font-size:14px; color:var(--gold); margin-bottom:8px; letter-spacing:2px; }
    .coupon-desc { font-size:13px; color:var(--text); margin-bottom:6px; }
    .coupon-min  { font-size:11px; color:var(--dim); }
    .copy-btn { position:absolute; top:12px; right:12px; background:var(--dark4); border:none; color:var(--dim); font-size:12px; padding:4px 10px; border-radius:4px; cursor:pointer; }
    .copy-btn:hover { background:var(--red); color:#fff; }
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div class="page-wrap">
  <div class="sec-header">
    <div class="sec-title">🎟️ AVAILABLE COUPONS</div>
  </div>
  <div class="coupon-grid" id="couponGrid">
    <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>
</div>
<div id="footer-root"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
async function init() {
  await Components.init();
  try {
    const coupons = await Api.coupons.list();
    document.getElementById('couponGrid').innerHTML = coupons.map(c => {
      let desc = '';
      if (c.type === 'percent')  desc = `${c.discount}% off your order`;
      else if (c.type === 'fixed')    desc = `₱${Number(c.discount).toLocaleString()} off your order`;
      else if (c.type === 'freeship') desc = 'Free shipping on any order';
      if (c.category) desc += ` (${c.category} only)`;
      const min = c.min_order > 0 ? `Min. order: ₱${Number(c.min_order).toLocaleString()}` : 'No minimum order';
      const exp = c.expires_at ? `Expires: ${new Date(c.expires_at).toLocaleDateString()}` : 'No expiry';
      return `
<div class="coupon-card">
  <button class="copy-btn" onclick="copyCoupon('${c.code}')">Copy</button>
  <div class="coupon-code">${Components._esc(c.code)}</div>
  <div class="coupon-desc">${Components._esc(desc)}</div>
  <div class="coupon-min">${min} • ${exp}</div>
</div>`;
    }).join('') || '<p style="color:var(--dim);grid-column:1/-1;text-align:center;padding:40px">No coupons available right now.</p>';
  } catch {
    document.getElementById('couponGrid').innerHTML = '<p style="color:var(--dim);text-align:center;padding:40px">Could not load coupons.</p>';
  }
}

function copyCoupon(code) {
  navigator.clipboard.writeText(code).then(() => showToast(`Copied: ${code}`)).catch(() => showToast(code));
}
init();
</script>
</body>
</html>
