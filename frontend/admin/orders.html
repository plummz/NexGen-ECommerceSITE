<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Orders — Admin | NexGen</title>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .admin-layout{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:100vh}
    .admin-sidebar{background:var(--dark);border-right:2px solid var(--dark4);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
    .admin-logo{font-family:'Press Start 2P',sans-serif;font-size:10px;color:var(--gold);padding:0 20px 20px;border-bottom:1px solid var(--dark4);margin-bottom:16px;line-height:2}
    .admin-logo span{color:var(--red)}
    .admin-nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:13px;color:var(--dim);cursor:pointer;border-left:3px solid transparent;text-decoration:none}
    .admin-nav a:hover,.admin-nav a.active{background:var(--dark2);color:var(--gold);border-left-color:var(--red)}
    .admin-main{padding:32px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--dark4)}
    td{padding:10px 12px;border-bottom:1px solid var(--dark4);vertical-align:middle}
    tr:hover td{background:rgba(255,255,255,.02)}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .modal-box{background:var(--dark2);border:1px solid var(--dark4);border-radius:10px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
    .filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">⚙️ NEXGEN<br><span>ADMIN</span></div>
    <nav class="admin-nav">
      <a href="index.html">📊 Dashboard</a>
      <a href="products.html">📦 Products</a>
      <a href="orders.html" class="active">🚚 Orders</a>
      <a href="users.html">👥 Users</a>
      <hr style="border-color:var(--dark4);margin:12px 0">
      <a href="../index.html">🏠 View Store</a>
      <a onclick="Auth.logout()" style="color:var(--red)">🚪 Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    <h1 style="font-family:'Press Start 2P',sans-serif;font-size:14px;color:var(--gold);margin-bottom:24px">ORDERS</h1>

    <div class="filter-bar">
      <select id="statusFilter" class="form-control" style="width:auto" onchange="loadOrders()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="packed">Packed</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <span id="totalCount" style="font-size:13px;color:var(--dim);padding:8px 0"></span>
    </div>

    <div class="panel">
      <div id="ordersTable"><div class="loading-center"><div class="spinner"></div></div></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button class="btn-outline btn-sm" id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <span id="pageInfo" style="font-size:13px;color:var(--dim);padding:6px 12px"></span>
        <button class="btn-outline btn-sm" id="nextBtn" onclick="changePage(1)">Next →</button>
      </div>
    </div>
  </main>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal" id="orderModal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 style="font-family:'Press Start 2P',sans-serif;font-size:11px;color:var(--gold)">ORDER DETAIL</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
if (!Auth.isLoggedIn() || !Auth.isAdmin()) location.href = '../profile.html';
let page=1, totalPages=1;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function loadOrders() {
  const status = document.getElementById('statusFilter').value;
  const el     = document.getElementById('ordersTable');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const { orders, total } = await Api.admin.orders.list({ page, limit:20, status });
    totalPages = Math.ceil(total/20);
    document.getElementById('totalCount').textContent = `${total} orders`;
    document.getElementById('pageInfo').textContent   = `Page ${page} of ${totalPages||1}`;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= totalPages;

    el.innerHTML = `<table>
<tr><th>ID</th><th>Customer</th><th>Date</th><th>Status</th><th>Payment</th><th>Total</th><th>Action</th></tr>
${orders.map(o => `
<tr>
  <td><strong>#${o.id}</strong></td>
  <td>${esc(o.customer_name)}</td>
  <td style="color:var(--dim);white-space:nowrap">${new Date(o.created_at).toLocaleDateString()}</td>
  <td><span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span></td>
  <td style="color:var(--dim)">${esc(o.payment_method.toUpperCase())}</td>
  <td style="color:var(--red);font-weight:bold">₱${Number(o.total).toLocaleString()}</td>
  <td><button class="btn-outline btn-sm" onclick="viewOrder(${o.id})">View</button></td>
</tr>`).join('')}
</table>`;
  } catch {
    el.innerHTML = '<p style="color:var(--dim);text-align:center;padding:40px">Could not load orders.</p>';
  }
}

function changePage(dir) {
  const next = page+dir;
  if (next<1||next>totalPages) return;
  page=next; loadOrders();
}

async function viewOrder(id) {
  document.getElementById('modalContent').innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  document.getElementById('orderModal').classList.add('open');
  try {
    const o = await Api.admin.orders.get(id);
    document.getElementById('modalContent').innerHTML = `
<div style="margin-bottom:16px">
  <div style="font-size:13px;color:var(--dim);margin-bottom:4px">Order #${o.id} • ${new Date(o.created_at).toLocaleString()}</div>
  <div style="margin-bottom:8px"><strong>${esc(o.customer_name)}</strong> • ${esc(o.customer_email)}</div>
  <div style="font-size:13px;color:var(--dim)">Ship to: ${esc(o.shipping_name)}, ${esc(o.shipping_line1)}, ${esc(o.shipping_city)}</div>
</div>

<div style="margin-bottom:16px">
  ${(o.items||[]).map(i => `
  <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--dark4);font-size:13px">
    <span>${esc(i.name)} ${i.variation&&i.variation!=='default'?'('+esc(i.variation)+')':''} x${i.quantity}</span>
    <span style="color:var(--red)">₱${Number(i.subtotal).toLocaleString()}</span>
  </div>`).join('')}
  <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:bold">
    <span>Total</span><span style="color:var(--red)">₱${Number(o.total).toLocaleString()}</span>
  </div>
</div>

<div class="form-group">
  <label>Update Status</label>
  <select id="newStatus" class="form-control">
    ${['pending','confirmed','packed','shipped','delivered','cancelled','refunded'].map(s =>
      `<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`
    ).join('')}
  </select>
</div>
<div class="form-group">
  <label>Note (optional)</label>
  <input id="statusNote" class="form-control" placeholder="Add a note for this status update">
</div>
<button class="btn-primary" onclick="updateStatus(${id})">Update Status</button>`;
  } catch {
    document.getElementById('modalContent').innerHTML = '<p style="color:var(--dim)">Could not load order.</p>';
  }
}

async function updateStatus(id) {
  const status = document.getElementById('newStatus').value;
  const note   = document.getElementById('statusNote').value;
  try {
    await Api.admin.orders.setStatus(id, { status, note });
    closeModal();
    loadOrders();
    showToast('Order status updated.');
  } catch (err) { showToast(err.message, 'error'); }
}

function closeModal() { document.getElementById('orderModal').classList.remove('open'); }
function showToast(msg,type='success'){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}t.textContent=msg;t.className=`toast toast-${type} show`;clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}

document.getElementById('orderModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
loadOrders();
</script>
</body>
</html>
