<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — John Rey's NexGen Shop</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .prod-layout { display:flex; gap:40px; align-items:flex-start; }
    .prod-left { width:440px; flex-shrink:0; }
    .prod-img-main {
      background:var(--dark2); border:1px solid var(--dark4);
      border-radius:10px; height:400px;
      display:flex; align-items:center; justify-content:center;
      font-size:130px; overflow:hidden; margin-bottom:14px;
    }
    .prod-img-main img { max-width:100%; max-height:100%; object-fit:contain; }
    .store-card { background:var(--dark2); border:1px solid var(--dark4); border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
    .store-avatar { width:48px; height:48px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-family:'Press Start 2P',sans-serif; font-size:14px; color:#fff; flex-shrink:0; }
    .store-name { font-weight:bold; }
    .store-detail { font-size:12px; color:var(--dim); margin-top:3px; }
    .prod-right { flex:1; min-width:0; }
    .prod-title { font-size:22px; font-weight:bold; margin-bottom:10px; line-height:1.4; }
    .prod-meta { display:flex; align-items:center; gap:16px; margin-bottom:16px; font-size:13px; color:var(--dim); flex-wrap:wrap; }
    .prod-rating { color:var(--gold); font-size:16px; }
    .price-block { background:var(--dark2); border:1px solid var(--dark4); border-radius:10px; padding:18px 20px; margin-bottom:20px; }
    .price-main { font-size:36px; font-weight:bold; color:var(--red); }
    .price-orig { font-size:14px; color:var(--dim); text-decoration:line-through; margin-left:10px; }
    .price-disc { display:inline-block; background:var(--gold); color:#000; font-size:12px; font-weight:bold; padding:2px 10px; border-radius:4px; margin-left:8px; }
    .price-install { font-size:13px; color:var(--dim); margin-top:6px; }
    .var-title { font-size:13px; color:var(--dim); margin-bottom:10px; }
    .var-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
    .var-btn { border:1px solid var(--dark4); background:var(--dark2); color:var(--dim); padding:7px 14px; border-radius:var(--radius); font-size:12px; cursor:pointer; transition:all .2s; }
    .var-btn:hover { border-color:var(--red); color:var(--text); }
    .var-btn.sel { border-color:var(--red); background:var(--red); color:#fff; }
    .qty-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .qty-label { font-size:13px; color:var(--dim); }
    .qty-ctrl { display:flex; align-items:center; border:1px solid var(--dark4); border-radius:var(--radius); overflow:hidden; }
    .qty-btn { background:var(--dark4); border:none; color:var(--text); width:38px; height:38px; font-size:20px; cursor:pointer; }
    .qty-btn:hover { background:var(--red); }
    .qty-val { background:var(--dark2); border:none; color:var(--text); width:50px; height:38px; text-align:center; font-size:15px; outline:none; }
    .action-row { display:flex; gap:12px; margin-bottom:20px; }
    .btn-big-cart { flex:1; background:var(--dark4); border:2px solid var(--red); color:var(--red); padding:14px; font-size:15px; font-weight:bold; border-radius:var(--radius); }
    .btn-big-cart:hover { background:var(--red); color:#fff; }
    .btn-big-buy { flex:1; background:var(--red); border:none; color:#fff; padding:14px; font-size:15px; font-weight:bold; border-radius:var(--radius); }
    .btn-big-buy:hover { background:var(--red-dark); }
    .guarantees { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; font-size:12px; color:var(--dim); }
    .related-grid { margin-top:48px; }
    @media(max-width:900px){
      .prod-layout { flex-direction:column; }
      .prod-left { width:100%; }
      .prod-img-main { height:300px; }
    }
  </style>
</head>
<body>

<div class="announce-bar">⚡ FREE SHIPPING on orders ₱500+ &nbsp;•&nbsp; COD AVAILABLE &nbsp;•&nbsp; 📱 09671756325</div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">JOHN REY'S <span>NEXGEN</span></a>
  <div class="nav-search">
    <input type="text" id="si" placeholder="Search products..."
           onkeydown="if(event.key==='Enter')location.href='products.html?q='+encodeURIComponent(this.value)"/>
    <button onclick="location.href='products.html?q='+encodeURIComponent(document.getElementById('si').value)">🔍</button>
  </div>
  <div class="nav-icons">
    <a href="deals.html"    class="nav-icon"><span class="icon">🔥</span><span>Deals</span></a>
    <a href="wishlist.html" class="nav-icon"><span class="icon">♡</span><span>Wishlist</span></a>
    <a href="cart.html"     class="nav-icon"><span class="icon">🛒</span><div id="cart-badge"></div><span>Cart</span></a>
    <a href="profile.html"  class="nav-icon"><span class="icon">👤</span><span id="nav-user-label">Login</span></a>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb" id="bc"></div>
  <div id="productArea"></div>
</div>

<footer class="footer">
  <div class="footer-grid">
    <div class="footer-brand"><div class="footer-logo">JOHN REY'S <span>NEXGEN</span></div><p>Your one-stop shop!</p></div>
    <div class="footer-col"><h4>Shop</h4><a href="products.html">All Products</a><a href="deals.html">Deals</a></div>
    <div class="footer-col"><h4>Account</h4><a href="profile.html">Profile</a><a href="cart.html">Cart</a></div>
    <div class="footer-col"><h4>Help</h4><a href="faq.html">FAQ</a><a href="about.html">About</a></div>
  </div>
  <div class="footer-bottom"><span>© 2025 John Rey's NexGen Shop</span><span>📱 09671756325</span></div>
</footer>

<script src="store.js"></script>
<script>
  const pid  = parseInt(new URLSearchParams(location.search).get("id"));
  const prod = Store.getProduct(pid);
  let selVar = 0, qty = 1;

  if (!prod) {
    document.getElementById("productArea").innerHTML =
      `<div class="empty-state"><div class="empty-icon">😢</div><h3>NOT FOUND</h3>
       <p>This product doesn't exist.</p>
       <button class="btn-primary" onclick="location.href='products.html'">Browse Products</button></div>`;
  } else {
    document.title = prod.name + " — John Rey's NexGen Shop";
    const cat  = CATEGORIES.find(c => c.id === prod.category);
    const disc = prod.originalPrice ? Math.round((1 - prod.price/prod.originalPrice)*100) : 0;

    document.getElementById("bc").innerHTML =
      `<a href="index.html">Home</a> ›
       <a href="products.html?cat=${prod.category}">${cat?.label}</a> ›
       <span>${prod.name}</span>`;

    function renderVars() {
      return prod.variations.map((v,i) =>
        `<button class="var-btn${i===selVar?" sel":""}" onclick="selVar(${i})">${v}</button>`
      ).join("");
    }

    document.getElementById("productArea").innerHTML = `
    <div class="prod-layout">
      <div class="prod-left">
        <div class="prod-img-main">
          ${prod.image
            ? `<img src="${prod.image}" alt="${prod.name}"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
               <span style="display:none">${productEmoji(prod.category)}</span>`
            : `<span>${productEmoji(prod.category)}</span>`}
        </div>
        <div class="store-card">
          <div class="store-avatar">JR</div>
          <div>
            <div class="store-name">John Rey's NexGen Shop</div>
            <div class="store-detail">✅ Verified &nbsp;•&nbsp; ⭐ 4.9 Rating &nbsp;•&nbsp; 📱 09671756325</div>
          </div>
        </div>
      </div>
      <div class="prod-right">
        ${prod.badge?`<span style="background:var(--red);color:#fff;font-size:10px;padding:2px 10px;border-radius:4px;margin-bottom:10px;display:inline-block">${prod.badge}</span>`:""}
        <div class="prod-title">${prod.name}</div>
        <div class="prod-meta">
          <span class="prod-rating">${stars(prod.rating)}</span>
          <span>${prod.rating} rating</span>
          <span>|</span><span>${prod.sold.toLocaleString()} sold</span>
          <span>|</span><span>${cat?.icon} ${cat?.label}</span>
        </div>
        <div class="price-block">
          <div>
            <span class="price-main">${formatPrice(prod.price)}</span>
            ${prod.originalPrice?`<span class="price-orig">${formatPrice(prod.originalPrice)}</span><span class="price-disc">-${disc}%</span>`:""}
          </div>
          <div class="price-install">or ₱${Math.round(prod.price/3).toLocaleString()} × 3 months via NexGenPay</div>
        </div>
        <div class="var-title">Variation: <strong id="varLabel">${prod.variations[0]}</strong></div>
        <div class="var-grid" id="varGrid">${renderVars()}</div>
        <div class="qty-row">
          <span class="qty-label">Qty:</span>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="chQty(-1)">−</button>
            <input class="qty-val" id="qtyInp" type="number" value="1" min="1" max="99"
                   onchange="qty=Math.max(1,parseInt(this.value)||1);this.value=qty"/>
            <button class="qty-btn" onclick="chQty(1)">+</button>
          </div>
        </div>
        <div class="action-row">
          <button class="btn-big-cart" onclick="addCart()">🛒 Add to Cart</button>
          <button class="btn-big-buy"  onclick="buyNow()">⚡ Buy Now</button>
        </div>
        <div style="margin-bottom:20px">
          <button class="btn-outline" id="wishBtn" onclick="doWish()">
            ${Store.isWishlisted(prod.id)?"♥ Wishlisted":"♡ Add to Wishlist"}
          </button>
        </div>
        <div class="guarantees">
          <span>✅ 100% Authentic</span>
          <span>🚚 Free Shipping ₱500+</span>
          <span>🔄 15-Day Returns</span>
          <span>🛡️ 1 Year Warranty</span>
          <span>💵 COD Available</span>
        </div>
        <div class="panel">
          <div class="panel-title">📋 DESCRIPTION</div>
          <div style="font-size:14px;color:var(--dim);line-height:1.8">${prod.desc}</div>
        </div>
      </div>
    </div>
    <div class="related-grid">
      <div class="sec-header" style="margin-bottom:16px">
        <div class="sec-title">🛍️ MORE FROM ${(cat?.label||"").toUpperCase()}</div>
      </div>
      <div class="products-grid" id="relGrid"></div>
    </div>`;

    // Related
    const rel = Store.getByCategory(prod.category).filter(p => p.id !== prod.id).slice(0,4);
    document.getElementById("relGrid").innerHTML = rel.map(p => buildProductCard(p)).join("");
  }

  function selVar(i) {
    selVar = i;
    document.getElementById("varLabel").textContent = prod.variations[i];
    document.getElementById("varGrid").innerHTML = prod.variations.map((v,j) =>
      `<button class="var-btn${j===i?" sel":""}" onclick="selVar(${j})">${v}</button>`
    ).join("");
  }
  function chQty(d) { qty = Math.max(1, qty+d); document.getElementById("qtyInp").value=qty; }
  function addCart() { Store.addToCart(prod.id, prod.variations[selVar], qty); showToast(prod.name+" added to cart!"); }
  function buyNow()  { addCart(); location.href="cart.html"; }
  function doWish()  {
    const a = Store.toggleWishlist(prod.id);
    document.getElementById("wishBtn").textContent = a?"♥ Wishlisted":"♡ Add to Wishlist";
    showToast(a?"Added to wishlist!":"Removed from wishlist");
  }
</script>
</body>
</html>
